// ── Helpers ──────────────────────────────────────────────────────────────────

// Load the character table — from room metadata if saved, else DEFAULT_CHARACTERS
async function getCharacterTable() {
  const roomMeta = await OBR.room.getMetadata();
  if (roomMeta[`${EXT_ID}/characters`]) {
    return roomMeta[`${EXT_ID}/characters`];
  }
  return DEFAULT_CHARACTERS;
}

// Look up a character entry by real name (case-insensitive)
function findCharacter(table, realName) {
  const lower = realName.toLowerCase().trim();
  return table.find(c => c.name.toLowerCase().trim() === lower);
}

// Generate a placeholder name like "Male Dwarf 1"
// Counts existing tokens on the scene that share the same gender+race placeholder prefix
async function generatePlaceholder(gender, race) {
  const prefix = `${gender} ${race}`;
  const allItems = await OBR.scene.items.getItems(
    item => item.layer === "CHARACTER"
  );
  // Count tokens that already have this prefix in their current name
  const count = allItems.filter(item => {
    const meta = item.metadata[META_KEY];
    return meta && meta.placeholder && meta.placeholder.startsWith(prefix);
  }).length;
  return `${prefix} ${count + 1}`;
}

// ── Context menu ─────────────────────────────────────────────────────────────

OBR.onReady(async () => {

  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [
      {
        // Shown when token is currently showing REAL name (i.e. not hidden)
        icon: "/icon.svg",
        label: "Hide Name (show placeholder)",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: false },
          ],
        },
      },
      {
        // Shown when token is currently showing PLACEHOLDER name (hidden = true)
        icon: "/icon.svg",
        label: "Reveal Real Name",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: true },
          ],
        },
      },
      {
        // Shown when token has never been configured by this extension
        icon: "/icon.svg",
        label: "Set up name toggle",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
          ],
        },
      },
    ],

    async onClick(context) {
      const table = await getCharacterTable();

      for (const item of context.items) {
        const meta = item.metadata[META_KEY];

        // ── Token not yet set up ─────────────────────────────────────────────
        if (!meta) {
          const realName = item.name ? item.name.trim() : "";
          const entry = findCharacter(table, realName);

          let placeholder;
          if (entry) {
            placeholder = await generatePlaceholder(entry.gender, entry.race);
          } else {
            // Not in table — use generic placeholder
            placeholder = `Unknown ${await generatePlaceholder("Unknown", "Figure")}`;
          }

          // Store data and set to hidden (placeholder shown) immediately
          await OBR.scene.items.updateItems([item.id], (items) => {
            for (const it of items) {
              it.metadata[META_KEY] = {
                realName: realName,
                placeholder: placeholder,
                hidden: true,
              };
              // Switch display name to placeholder
              it.name = placeholder;
              // Update Forge metadata if present
              if (it.metadata[FORGE_NAME_KEY] !== undefined) {
                it.metadata[FORGE_NAME_KEY] = placeholder;
              }
            }
          });

          await OBR.notification.show(
            `"${realName}" → placeholder "${placeholder}" set. Name is now hidden.`,
            "INFO"
          );
          return;
        }

        // ── Toggle existing token ────────────────────────────────────────────
        const nowHidden = meta.hidden;

        await OBR.scene.items.updateItems([item.id], (items) => {
          for (const it of items) {
            const d = it.metadata[META_KEY];
            if (!d) return;

            if (nowHidden) {
              // Reveal real name
              it.name = d.realName;
              if (it.metadata[FORGE_NAME_KEY] !== undefined) {
                it.metadata[FORGE_NAME_KEY] = d.realName;
              }
              d.hidden = false;
            } else {
              // Hide — show placeholder
              it.name = d.placeholder;
              if (it.metadata[FORGE_NAME_KEY] !== undefined) {
                it.metadata[FORGE_NAME_KEY] = d.placeholder;
              }
              d.hidden = true;
            }
          }
        });
      }
    },
  });

});
