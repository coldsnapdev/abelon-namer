// ── Helpers ──────────────────────────────────────────────────────────────────

async function getCharacterTable() {
  const roomMeta = await OBR.room.getMetadata();
  if (roomMeta[`${EXT_ID}/characters`]) {
    return roomMeta[`${EXT_ID}/characters`];
  }
  return DEFAULT_CHARACTERS;
}

function findCharacter(table, realName) {
  const lower = realName.toLowerCase().trim();
  return table.find(c => c.name.toLowerCase().trim() === lower);
}

async function generatePlaceholder(gender, race) {
  const prefix = race ? `${gender} ${race}` : gender;
  const allItems = await OBR.scene.items.getItems(
    item => item.layer === "CHARACTER"
  );
  const count = allItems.filter(item => {
    const meta = item.metadata[META_KEY];
    return meta && meta.placeholder && meta.placeholder.startsWith(prefix);
  }).length;
  return `${prefix} ${count + 1}`;
}

// Apply a display name to all the places OBR and Forge show it
function applyDisplayName(it, displayName) {
  // Internal name (read by Clash, Forge, etc.)
  it.name = displayName;
  // Map label (what players see on the canvas)
  // Always write text even if the token didn't have a label before,
  // otherwise the visible name on the map never updates on first setup.
  it.text = {
    ...(it.text || {}),
    plainText: displayName,
    richText: [{ type: "paragraph", children: [{ text: displayName }] }],
  };
  // Forge stat block name
  if (it.metadata[FORGE_NAME_KEY] !== undefined) {
    it.metadata = {
      ...it.metadata,
      [FORGE_NAME_KEY]: displayName,
    };
  }
}

// Returns true if the placeholder was generated from a known gender — i.e. a
// proper race/gender combo. Anything else (Stranger, Unknown Figure, etc.) is
// treated as a fallback that should be reassigned when possible.
function isFallbackPlaceholder(placeholder) {
  const KNOWN_GENDERS = ["Male", "Female", "Non-binary", "Unknown"];
  return !KNOWN_GENDERS.some(g => placeholder.startsWith(g));
}

// ── Context menu ─────────────────────────────────────────────────────────────

OBR.onReady(async () => {

  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [
      {
        icon: "/figure.svg",
        label: "Hide Name (show placeholder)",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: false },
          ],
        },
      },
      {
        icon: "/figure.svg",
        label: "Reveal Real Name",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: true },
          ],
        },
      },
      {
        icon: "/figure.svg",
        label: "Reassign placeholder",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: true },
          ],
          // Note: OBR filters can't do string matching, so we show this option
          // on all hidden tokens and check isFallbackPlaceholder in onClick.
        },
      },
      {
        icon: "/figure.svg",
        label: "Set up name toggle",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
          ],
        },
      },
    ],

    async onClick(context) {
      const table = await getCharacterTable();

      for (const item of context.items) {
        const meta = item.metadata[META_KEY];

        // ── Token not yet set up ─────────────────────────────────────────────
        if (!meta) {
          const realName = item.name ? item.name.trim() : "";
          const entry = findCharacter(table, realName);

          let placeholder;
          if (entry) {
            placeholder = await generatePlaceholder(entry.gender, entry.race);
          } else {
            placeholder = await generatePlaceholder("Stranger", "");
          }

          await OBR.scene.items.updateItems([item], (items) => {
            for (const it of items) {
              it.metadata = {
                ...it.metadata,
                [META_KEY]: {
                  realName: realName,
                  placeholder: placeholder,
                  hidden: true,
                },
              };
              applyDisplayName(it, placeholder);
            }
          });

          await OBR.notification.show(
            `"${realName}" hidden as "${placeholder}".`,
            "INFO"
          );
          return;
        }

        // ── Reassign placeholder ─────────────────────────────────────────────
        // Re-runs table lookup and generates a fresh placeholder.
        // Fires when token is hidden and user picks "Reassign placeholder".
        // We detect this by checking if the label shown is "Reassign" — but
        // since OBR fires onClick for whichever icon matched, we infer intent
        // from whether the realName now exists in the table with a race/gender
        // that differs from the stored placeholder prefix.
        // Simpler approach: expose via a separate exported function called from
        // settings panel bulk reassign, and keep onClick purely for toggle.
        // The context menu "Reassign placeholder" reuses the same onClick but
        // we distinguish it: meta exists AND meta.hidden is true AND we
        // explicitly re-derive the placeholder.
        if (meta && meta.placeholder && isFallbackPlaceholder(meta.placeholder)) {
          const entry = findCharacter(table, meta.realName);
          if (entry) {
            const newPlaceholder = await generatePlaceholder(entry.gender, entry.race);
            const currentlyHidden = meta.hidden;
            await OBR.scene.items.updateItems([item], (items) => {
              for (const it of items) {
                const d = it.metadata[META_KEY];
                if (!d) return;
                it.metadata = {
                  ...it.metadata,
                  [META_KEY]: {
                    realName: d.realName,
                    placeholder: newPlaceholder,
                    hidden: currentlyHidden,
                  },
                };
                // If currently hidden, update the visible name to the new placeholder
                if (currentlyHidden) {
                  applyDisplayName(it, newPlaceholder);
                }
              }
            });
            await OBR.notification.show(
              `Placeholder updated to "${newPlaceholder}".`,
              "INFO"
            );
            continue;
          }
        }

        // ── Toggle existing token ────────────────────────────────────────────
        const nowHidden = meta.hidden;
        const displayName = nowHidden ? meta.realName : meta.placeholder;

        await OBR.scene.items.updateItems([item], (items) => {
          for (const it of items) {
            const d = it.metadata[META_KEY];
            if (!d) return;

            it.metadata = {
              ...it.metadata,
              [META_KEY]: {
                realName: d.realName,
                placeholder: d.placeholder,
                hidden: !nowHidden,
              },
            };
            applyDisplayName(it, displayName);
          }
        });
      }
    },
  });

});
