// ── Helpers ──────────────────────────────────────────────────────────────────

async function getCharacterTable() {
  const roomMeta = await OBR.room.getMetadata();
  if (roomMeta[`${EXT_ID}/characters`]) {
    return roomMeta[`${EXT_ID}/characters`];
  }
  return DEFAULT_CHARACTERS;
}

function findCharacter(table, realName) {
  const lower = realName.toLowerCase().trim();
  return table.find(c => c.name.toLowerCase().trim() === lower);
}

async function generatePlaceholder(gender, race) {
  const prefix = `${gender} ${race}`;
  const allItems = await OBR.scene.items.getItems(
    item => item.layer === "CHARACTER"
  );
  const count = allItems.filter(item => {
    const meta = item.metadata[META_KEY];
    return meta && meta.placeholder && meta.placeholder.startsWith(prefix);
  }).length;
  return `${prefix} ${count + 1}`;
}

// Apply a display name to all the places OBR and Forge show it
function applyDisplayName(it, displayName) {
  // Internal name (read by Clash, Forge, etc.)
  it.name = displayName;
  // Map label (what players see on the canvas)
  if (it.text !== undefined) {
    it.text = {
      ...it.text,
      plainText: displayName,
      richText: [{ type: "paragraph", children: [{ text: displayName }] }],
    };
  }
  // Forge stat block name
  if (it.metadata[FORGE_NAME_KEY] !== undefined) {
    it.metadata = {
      ...it.metadata,
      [FORGE_NAME_KEY]: displayName,
    };
  }
}

// ── Context menu ─────────────────────────────────────────────────────────────

OBR.onReady(async () => {

  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [
      {
        icon: "/figure.svg",
        label: "Hide Name (show placeholder)",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: false },
          ],
        },
      },
      {
        icon: "/figure.svg",
        label: "Reveal Real Name",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
            { key: ["metadata", META_KEY, "hidden"], value: true },
          ],
        },
      },
      {
        icon: "/figure.svg",
        label: "Set up name toggle",
        filter: {
          every: [
            { key: "layer", value: "CHARACTER" },
          ],
        },
      },
    ],

    async onClick(context) {
      const table = await getCharacterTable();

      for (const item of context.items) {
        const meta = item.metadata[META_KEY];

        // ── Token not yet set up ─────────────────────────────────────────────
        if (!meta) {
          const realName = item.name ? item.name.trim() : "";
          const entry = findCharacter(table, realName);

          let placeholder;
          if (entry) {
            placeholder = await generatePlaceholder(entry.gender, entry.race);
          } else {
            placeholder = await generatePlaceholder("Unknown", "Figure");
          }

          await OBR.scene.items.updateItems([item], (items) => {
            for (const it of items) {
              it.metadata = {
                ...it.metadata,
                [META_KEY]: {
                  realName: realName,
                  placeholder: placeholder,
                  hidden: true,
                },
              };
              applyDisplayName(it, placeholder);
            }
          });

          await OBR.notification.show(
            `"${realName}" hidden as "${placeholder}".`,
            "INFO"
          );
          return;
        }

        // ── Toggle existing token ────────────────────────────────────────────
        const nowHidden = meta.hidden;
        const displayName = nowHidden ? meta.realName : meta.placeholder;

        await OBR.scene.items.updateItems([item], (items) => {
          for (const it of items) {
            const d = it.metadata[META_KEY];
            if (!d) return;

            it.metadata = {
              ...it.metadata,
              [META_KEY]: {
                realName: d.realName,
                placeholder: d.placeholder,
                hidden: !nowHidden,
              },
            };
            applyDisplayName(it, displayName);
          }
        });
      }
    },
  });

});
